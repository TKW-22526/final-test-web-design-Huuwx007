<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi tiết sách</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/bookdetail.css" />
    <link rel="stylesheet" href="../css/quotes.css" />
  </head>
  <body>
    <nav>
      <div class="nav-inner">
        <a class="brand" href="../index.html">
          <svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#C9A227"
            stroke-width="2"
          >
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
          </svg>
          Giấy &amp; Mực
        </a>
        <div class="nav-tabs">
          <a class="nav-btn" href="../index.html">Trang chủ</a>
          <a class="nav-btn" href="cua-hang.html">Cửa hàng</a>
          <a class="nav-btn" href="cart.html"
            >Giỏ hàng <span id="cart-count"></span
          ></a>
          <a class="nav-btn active" href="library.html">Thư viện của tôi</a>
          <a class="nav-btn" href="quotes.html">Trích dẫn của tôi</a>
          <a class="nav-btn" href="gioi-thieu.html">Giới thiệu</a>
          <a class="nav-btn" href="lien-he.html">Liên hệ</a>
        </div>
      </div>
    </nav>

    <div class="wrap" id="detail-root">
      <a class="btn btn-link" href="library.html">← Quay lại thư viện</a>

      <div class="detail-head" style="margin-top: 16px">
        <div id="detail-cover"></div>
        <div class="detail-meta">
          <h1 class="detail-title" id="detail-title"></h1>
          <p class="detail-sub" id="detail-sub"></p>
          <div class="status-choices" id="detail-status-choices"></div>
          <div id="detail-progress"></div>
          <div style="margin-top: 10px">
            <span class="slider-label" style="margin-right: 8px"
              >Đánh giá:</span
            >
            <span class="stars" id="detail-stars"></span>
            <button
              class="btn btn-rose"
              style="margin-top: 12px"
              onclick="deleteCurrentBook()"
            >
              🗑 Xóa khỏi thư viện
            </button>
          </div>
        </div>
      </div>

      <!-- Trích dẫn RIÊNG của cuốn sách này -->
      <div class="quotes-panel">
        <h2>
          <svg
            width="17"
            height="17"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#A8433A"
            stroke-width="2"
          >
            <path
              d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V21z"
            />
            <path
              d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v4z"
            />
          </svg>
          Trích dẫn của cuốn sách này
        </h2>
        <div class="quote-form">
          <input
            type="text"
            id="quote-input"
            placeholder="Nhập đoạn trích bạn thấy hay..."
          />
          <input
            type="text"
            id="quote-author-input"
            placeholder="Tác giả (để trống = tác giả sách)"
          />
          <input
            type="text"
            id="quote-page-input"
            class="page-input"
            placeholder="Trang"
          />
          <button class="btn btn-rose" onclick="addQuote()">+ Lưu</button>
        </div>
        <div id="detail-quotes"></div>
      </div>
    </div>

    <div id="toast"></div>

    <script src="../js/data.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/detail.js"></script>
  </body>
</html>
