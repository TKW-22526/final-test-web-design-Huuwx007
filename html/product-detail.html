<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chi tiết sản phẩm</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/style.css" />
<link rel="stylesheet" href="../css/product-detail.css" />
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="brand" href="../index.html">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C9A227" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      Giấy &amp; Mực
    </a>
    <div class="nav-tabs">
      <a class="nav-btn active" href="../index.html">Cửa hàng</a>
      <a class="nav-btn" href="cart.html">Giỏ hàng <span id="cart-count"></span></a>
      <a class="nav-btn" href="library.html">Thư viện</a>
      <a class="nav-btn" href="quotes.html">Trích dẫn</a>
      <button class="nav-btn" id="theme-toggle" onclick="toggleTheme()">🌙</button>
    </div>
  </div>
</nav>

<div class="wrap" id="product-root">
  <a class="btn btn-link" href="../index.html">← Quay lại cửa hàng</a>

  <div class="product-layout" style="margin-top:16px;">
    <div class="gallery">
      <div class="main-image" id="main-image"></div>
      <div class="thumbs" id="thumbs"></div>
    </div>

    <div class="product-info">
      <span class="genre-tag" id="pd-genre"></span>
      <h1 class="pd-title" id="pd-title"></h1>
      <p class="pd-author" id="pd-author"></p>
      <div class="pd-price" id="pd-price"></div>
      <p class="pd-desc" id="pd-desc"></p>
      <div class="pd-actions">
        <button class="btn btn-primary pd-btn" onclick="addToCartFromDetail()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          Thêm vào giỏ
        </button>
        <button class="btn btn-gold pd-btn" onclick="buyNow()">Mua ngay</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="../js/data.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/product-detail.js"></script>
</body>
</html>
